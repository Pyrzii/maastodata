<script>
  let deferredInstallPrompt;

  window.addEventListener('beforeinstallprompt', (e) => {
    // Prevent Chrome 67 and earlier from automatically showing the prompt
    e.preventDefault();
    // Stash the event so it can be triggered later.
    deferredInstallPrompt = e;
    // Update UI to notify the user they can add to home screen
    document.getElementById('install-btn').style.display = 'block';
  });

  window.addEventListener('appinstalled', (evt) => {
    // Hide the install button with the event.
    document.getElementById('install-btn').style.display = 'none';
  });

  function installPWA() {
    // Show the install prompt
    deferredInstallPrompt.prompt();
    // Wait for the user to respond to the prompt
    deferredInstallPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') {
        console.log('User accepted the A2HS prompt');
      } else {
        console.log('User dismissed the A2HS prompt');
      }
      deferredInstallPrompt = null; // Clear the deferredPrompt variable once it has been used.
    });
  }
</script>
<!-- Install Button -->
<div id="install-btn" style="display:none; text-align: center; background-color: green; color: white; padding: 10px; cursor: pointer;" onclick="installPWA()">
  📥 Asenna
</div>
<style>
  #install-btn {
    display: none; /* Hidden by default */
    font-size: 16px;
    padding: 10px;
    background-color: green;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
</style>
